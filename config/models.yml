# =============================================================================
# xv7 — Model Registry
# =============================================================================
# Defines all LLM and embedding model configurations used by the Core service.
# Add entries here as new models are pulled into Ollama.
# =============================================================================

ollama:
  base_url: "http://ollama:11434"    # Internal Docker network URL
  timeout_seconds: 120

# ---------------------------------------------------------------------------
# Generation Models
# ---------------------------------------------------------------------------
models:

  default:
    name: llama3.2
    provider: ollama
    context_window: 131072
    temperature: 0.7
    top_p: 0.9
    max_tokens: 4096
    system_prompt: >
      You are xv7, a helpful and knowledgeable local AI assistant.
      You are direct, accurate, and concise.

  reasoning:
    name: deepseek-r1:8b
    provider: ollama
    context_window: 65536
    temperature: 0.3
    top_p: 0.95
    max_tokens: 8192
    system_prompt: >
      You are a careful and methodical reasoning assistant. Think step by step.

  code:
    name: qwen2.5-coder:7b
    provider: ollama
    context_window: 32768
    temperature: 0.2
    top_p: 0.95
    max_tokens: 8192
    system_prompt: >
      You are an expert software engineer. Write clean, well-structured code.

# ---------------------------------------------------------------------------
# Embedding Models
# ---------------------------------------------------------------------------
embeddings:

  default:
    name: nomic-embed-text
    provider: ollama
    dimensions: 768

  large:
    name: mxbai-embed-large
    provider: ollama
    dimensions: 1024

# ---------------------------------------------------------------------------
# Pull manifest — models to auto-pull on Core service startup
# ---------------------------------------------------------------------------
auto_pull:
  - llama3.2
  - nomic-embed-text
