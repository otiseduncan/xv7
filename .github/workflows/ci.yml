name: xv7 CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint & type-check the Core Python package
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check core/

      - name: Ruff format check
        run: ruff format --check core/

      - name: Mypy type check
        run: mypy core/ --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Run the test suite
  # ---------------------------------------------------------------------------
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r core/requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

  # ---------------------------------------------------------------------------
  # Build & validate Docker images (no push on PR, push to GHCR on main)
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build core image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/core/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build open-webui image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/open-webui/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ghcr.io/${{ github.repository }}/open-webui:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
