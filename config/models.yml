# =============================================================================
# xv7 — Centralized Ollama Model Registry
# =============================================================================
# Raw Ollama model tags are defined only in this file.
# Runtime selection happens via XV7_MODEL_PROFILE.
#
# Rescue default: low_resource is intentionally tiny so the field laptop can boot,
# talk, diagnose, and help repair XV7 without paid VS Code credits or a GPU.
# Switch XV7_MODEL_PROFILE to balanced/local_test/large_code on stronger machines.
# =============================================================================

ollama:
  base_url: "http://ollama:11434"
  timeout_seconds: 2.0

registry:
  active_profile: low_resource

  role_aliases:
    default: chat
    chat: chat
    model_default: chat
    assistant: chat

    embedding: embedding
    embed: embedding
    embedding_model: embedding
    model_embed: embedding

    reasoning: reasoning
    model_reasoning: reasoning

    code: code
    model_code: code

  profiles:
    low_resource:
      chat: qwen3:0.6b
      reasoning: qwen3:0.6b
      code: qwen3:0.6b
      embedding: nomic-embed-text:latest

    balanced:
      chat: qwen3:8b
      reasoning: qwen3:14b
      code: qwen3:14b
      embedding: nomic-embed-text:latest

    local_test:
      chat: qwen3:14b
      reasoning: qwen3:14b
      code: qwen3-coder:30b
      embedding: nomic-embed-text:latest

    large_code:
      chat: qwen3-coder:30b
      reasoning: qwen3:14b
      code: qwen3-coder:30b
      embedding: nomic-embed-text:latest

  legacy:
    unused:
      - qwen2.5-coder:14b
