# =============================================================================
# xv7 — Multi-container AI Orchestration Platform
# =============================================================================
# Services  : ollama | open-webui | xv7-core | xv7-frontend
# Network   : xv7-network  (private bridge — services talk by name)
# Volumes   : ollama_data | open_webui_data | core_data | xv7_shared
#
# Rescue branch default: CPU-first, local-first, no paid editor credits required.
# For GPU machines, add a GPU override later instead of making the field laptop fail.
#
# Usage:
#   cp .env.example .env        # then fill in secrets
#   docker compose up -d --build
# =============================================================================

# ---------------------------------------------------------------------------
# Named volumes — all state persisted outside container lifecycles
# ---------------------------------------------------------------------------
volumes:

  # Ollama model cache (~GB-scale; survives container upgrades)
  ollama_data:
    driver: local

  # Open WebUI settings, user accounts, chat history
  open_webui_data:
    driver: local

  # xv7-core structured DB, vector store, memory journals
  core_data:
    driver: local

  # Shared read/write volume: 3D avatar assets & runtime state
  # Mounted into BOTH xv7-core (write) and open-webui (read)
  xv7_shared:
    driver: local

# ---------------------------------------------------------------------------
# Private bridge network — no external access except mapped ports
# ---------------------------------------------------------------------------
networks:
  xv7-network:
    driver: bridge
    name: xv7-network

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # -------------------------------------------------------------------------
  # ollama — local LLM inference engine
  # -------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:${OLLAMA_VERSION:-latest}
    container_name: xv7-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"   # REST API reachable from host
    volumes:
      - ${OLLAMA_MODELS_PATH:-ollama_data}:/root/.ollama
    networks:
      - xv7-network
    environment:
      - OLLAMA_HOST=0.0.0.0             # Listen on all interfaces inside container
      - OLLAMA_ORIGINS=${OLLAMA_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # -------------------------------------------------------------------------
  # open-webui — browser-based chat and model management interface
  # Shared volume gives the UI read access to 3D assets produced by core.
  # -------------------------------------------------------------------------
  open-webui:
    build:
      context: ./docker/open-webui
      dockerfile: Dockerfile
    container_name: xv7-open-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-8080}:8080"       # Browse to http://localhost:8080
    volumes:
      - open_webui_data:/app/backend/data
      - xv7_shared:/app/shared:ro        # Read-only access to shared assets
    networks:
      - xv7-network
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:?WEBUI_SECRET_KEY must be set}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - DEFAULT_MODELS=${DEFAULT_MODELS:-}
      - ENABLE_RAG_WEB_SEARCH=${ENABLE_RAG_WEB_SEARCH:-false}
      - RAG_WEB_SEARCH_ENGINE=${RAG_WEB_SEARCH_ENGINE:-}
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # -------------------------------------------------------------------------
  # xv7-frontend — lightweight static host for the custom Vanilla JS SPA
  # -------------------------------------------------------------------------
  xv7-frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: xv7-frontend
    restart: unless-stopped
    ports:
      - "3000:80"                      # Browse to http://localhost:3000
    volumes:
      - ./public:/usr/share/nginx/html # Live-reload for index.html and app.js
    environment:
      - XV7_API_KEY=${CORE_API_KEY:?CORE_API_KEY must be set}
    depends_on:
      xv7-core:
        condition: service_started
    networks:
      - xv7-network

  # -------------------------------------------------------------------------
  # xv7-core — Python orchestration, agent runtime, and memory engine
  # Shared volume gives core write access; open-webui reads from the same.
  # -------------------------------------------------------------------------
  xv7-core:
    build:
      context: .
      dockerfile: docker/core/Dockerfile
    container_name: xv7-core
    restart: unless-stopped
    ports:
      - "${CORE_PORT:-8000}:8000"        # FastAPI available at http://localhost:8000
    volumes:
      - ./core:/app/core                 # Live-reload: source changes apply instantly
      - ./config:/app/config             # Persona and system configuration files
      - ${XV7_HOST_SANDBOX:-./generated-sites}:/app/generated-sites
      # Rescue/operator branch: writable workspace lets confirmed operator actions patch the repo.
      # Keep this on a rescue/dev branch only; do not use writable repo mounts in production.
      - ./:/workspace:rw
      - core_data:/app/data:rw           # Persistent DB, vectors, memory logs
      - ./data/brain/records:/app/data/brain/records:ro
      - xv7_shared:/app/shared           # Write 3D assets & state for open-webui
    networks:
      - xv7-network
    environment:
      - ENV=${ENV:-development}
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_BASE_URL=http://open-webui:8080
      - XV7_BRAIN_RECORDS_PATH=/app/data/brain/records
      - XV7_BRAIN_RUNTIME_RECORDS_PATH=/app/data/brain/runtime_records
      - XV7_API_KEY=${CORE_API_KEY:?CORE_API_KEY must be set}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DB_PATH=${DB_PATH:-/app/data/xv7.db}
      - VECTOR_DB_PATH=${VECTOR_DB_PATH:-/app/data/vectors}
      - MEMORY_DB_PATH=${MEMORY_DB_PATH:-/app/data/memory}
      - ASSETS_PATH=${ASSETS_PATH:-/app/shared/assets}
      - XV7_MODEL_PROFILE=${XV7_MODEL_PROFILE:-low_resource}
      - XV7_OPERATOR_REPO_ROOT=/workspace
      - XV7_OPERATOR_FAST_GIT_STATUS=1
      - XV7_LOCAL_BRIDGE_URL=${XV7_LOCAL_BRIDGE_URL:-http://host.docker.internal:8765}
      - XV7_LOCAL_BRIDGE_TOKEN=${XV7_LOCAL_BRIDGE_TOKEN:-xv7-local-bridge-token}
      - XV7_LOCAL_BRIDGE_TIMEOUT_SECONDS=${XV7_LOCAL_BRIDGE_TIMEOUT_SECONDS:-10}
      - GIT_CONFIG_COUNT=3
      - GIT_CONFIG_KEY_0=safe.directory
      - GIT_CONFIG_VALUE_0=/workspace
      - GIT_CONFIG_KEY_1=core.autocrlf
      - GIT_CONFIG_VALUE_1=true
      - GIT_CONFIG_KEY_2=core.filemode
      - GIT_CONFIG_VALUE_2=false
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
