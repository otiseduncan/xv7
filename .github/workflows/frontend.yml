name: xv7 Frontend

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "e2e/**"
      - "playwright.config.mjs"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "e2e/**"
      - "playwright.config.mjs"
      - ".github/workflows/frontend.yml"

jobs:
  frontend-unit:
    name: Frontend unit and build checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm test

      - name: Run build placeholder
        run: npm run build
